server:
  port: 9002

spring:
  application:
    name: BOOKING-SERVICE
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/booking_db?serverTimezone=UTC
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

grpc:
  client:
    flight-service:
      address: static://127.0.0.1:9090
      negotiation-type: plaintext
      enable-keep-alive: true
      keep-alive-without-calls: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/