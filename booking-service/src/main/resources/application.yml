server:
  port: 9002

spring:
  application:
    name: BOOKING-SERVICE
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql-db:3306/booking_db?serverTimezone=UTC
    username: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

grpc:
  client:
    flight-service:
      address: static://flight-service:9090
      negotiation-type: plaintext
      enable-keep-alive: true
      keep-alive-without-calls: true
eureka:
  client:
    serviceUrl:
      defaultZone: http://service-registry:8761/eureka/